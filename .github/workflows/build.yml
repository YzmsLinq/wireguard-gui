# Build the application

name: Build

on: [push, pull_request]

jobs:
  build:
    strategy:
      fail-fast: true

    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v3

      # Cache Rust
      - uses: actions/cache@v3
        with:
          path: ./src-tauri/target
          key: ubuntu-latest-${{ hashFiles('./src-tauri/Cargo.lock') }}

      # Cache Rust
      - uses: actions/cache@v3
        with:
          path: ~/.cargo
          key: ubuntu-latest-${{ hashFiles('./src-tauri/Cargo.lock') }}

      # Cache Node
      - uses: actions/cache@v3
        with:
          path: ./node_modules
          key: ubuntu-latest-${{ hashFiles('./package-lock.json') }}

      # Cache Next.js
      - uses: actions/cache@v3
        with:
          path: ./.next
          key: ubuntu-latest

      - name: Install Node.js LTS
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libappindicator3-dev librsvg2-dev libudev-dev patchelf \
            libwebkit2gtk-4.1-0=2.50.4-0ubuntu0.22.04.1 \
            libwebkit2gtk-4.1-dev=2.50.4-0ubuntu0.22.04.1 \
            libjavascriptcoregtk-4.1-0=2.50.4-0ubuntu0.22.04.1 \
            libjavascriptcoregtk-4.1-dev=2.50.4-0ubuntu0.22.04.1 \
            gir1.2-javascriptcoregtk-4.1=2.50.4-0ubuntu0.22.04.1 \
            gir1.2-webkit2-4.1=2.50.4-0ubuntu0.22.04.1

      # - name: Enable static CRT
      #   run: |
      #     echo "RUSTFLAGS=-C target-feature=+crt-static" >> $GITHUB_ENV
      #     echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
      #     echo "PKG_CONFIG_SYSROOT_DIR=/" >> $GITHUB_ENV

      - name: Install node dependencies
        run: npm install

      - name: Build application
        run: npm run tauri build -- --verbose
